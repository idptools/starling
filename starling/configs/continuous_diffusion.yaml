data:
  batch_size: 16
  test_data: null
  train_data: /home/borna/projects/starling/continuous_starling/data/70k_seqs/train.tsv
  val_data: /home/borna/projects/starling/continuous_starling/data/70k_seqs/validation.tsv

device:
  # cuda: [0]
  cuda: auto
  nodes: 1

unet:
  in_channels: 1
  out_channels: 1
  base: 64
  norm: group
  blocks: [2, 2, 2]
  middle_blocks: 2
  labels_dim: 384

