  encoder_path: /home/borna/projects/starling/continuous_starling/encoder/model-kernel-epoch=99-epoch_val_loss=1.72.ckpt
  noise_schedule: karras
  set_lr: 0.0001
  min_snr_loss_weight: False
  min_snr_gamma: 5
  config_scheduler: LinearWarmupCosineAnnealingLR
  labels: learned-embeddings

training:
  num_epochs: 1
  gradient_clip_val: 1.0
  output_path: continuous-diffusion
  project_name: starling-continuous-diffusion